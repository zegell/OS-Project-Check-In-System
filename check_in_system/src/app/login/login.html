<div class = "d-flex align-item-center justify-content-center themeBlue"  style = "min-height: 100vh;">
    <div class = "d-flex justify-content-center align-items-center">
		<div class = "shadow-lg rounded bg-secondary-subtle p-5" style = "width: 600px;">
			<div class = "text-center my-3">
				<h2 style = "font-size: 50px;">Log In</h2>
			</div>
            <div class = "container">
                <form (ngSubmit) = "submitLogin()">
                    <div class = "my-4 pt-5">
                        <label for = "signUpUsername" class  = "form-label text-black">Username</label>
                        <input type = "text" class = "form-control rounded p-2" name = "username" [(ngModel)] = "credentials.username" required>
                    </div>
                    <div class = "my-4">
                        <label for = "signUpPassword" class  = "form-label text-black">Password</label>
                        <input type = "password" class = "form-control rounded p-2" name = "password" [(ngModel)] = "credentials.password" required>
                    </div>
                    <div class = "mt-5">
                        <button class = "btn btn-solid-blue w-100 p-3">Log In</button>
                    </div>
                    <div class = "mt-3">
                        <a href = "/signup" class = "text-decoration-none">Register</a>
                    </div>
                    @if (errorMessage) {
                        <p> {{errorMessage}} </p>
                    }
                </form>
            </div>
		</div>
	</div>
</div>

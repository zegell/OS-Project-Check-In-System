<!DOCTYPE html>
<html>
<head>
    <title>Check-In System</title>
    <meta charset="utf-8">
    <script src = "script/auth-service.js"></script>
    <meta name = "viewport" content="width= device-width, initial-scale = 1.0">
    <link href = "css/bootstrap.min.css" rel="stylesheet">
    <link href = "css/theme.css" rel="stylesheet">
    <link href = "icons/bootstrap-icons.min.css" rel = "stylesheet">
    <script src = "js/bootstrap.bundle.min.js"></script>
</head>
<body class = "mt-3 pt-3 mb-5 pb-5 themeBlue" style = "min-height: 100vh;">  
    <div class = "d-flex align-items-center justify-content-between px-3 mt-5">
        <h2 id = "userGreet" class = "text-white" style = "font-size: 40px;">Hello!</h2>
        <button class="btn btn-theme-yellow" onclick = "handleLogout()">Log Out</button>
    </div> 
    <div class="bg-secondary-subtle rounded p-3 mx-3 border shadow mt-3">
        <div>
            <h4 class = "mb-4 mt-2">Check In History</h4>
            <div class = "d-flex themeYellow p-3 mb-4 rounded shadow align-items-center gap-2">
                <h5>Total Check In: <h5 id = "totalCheckIn"></h5></h5>
            </div>
        </div>
        <div class="d-flex align-items-center justify-content-center rounded overflow-hidden shadow themeBlue">
            <table class="table table-hover">
                <thead>
                    <tr class = "table-theme small">
                        <th scope="col">Check-In ID</th>
                        <th scope="col">Longitude</th>
                        <th scope="col">Latitude</th>
                        <th scope="col">Check-In Time</th>
                    </tr>
                </thead>
                <tbody id = "checkInTableBody">
                </tbody>
            </table>
        </div>
        <div class="d-flex justify-content-between align-items-center mt-3 px-2">
            <span id="pageStatusText" class="small text-muted fw-bold">Page 1 of 1</span>
            <div class="btn-group">
                <button type="button" id="prevPageButton" class="btn btn-sm btn-outline-dark" onclick="changePage(-1)">
                    Previous
                </button>
                <button type="button" id="nextPageButton" class="btn btn-sm btn-outline-dark" onclick="changePage(1)">
                    Next
                </button>
            </div>
        </div>          
    </div>
    <div class = "bg-secondary-subtle d-flex flex-column align-items-center justify-content-center p-3 m-3 rounded">
        <p class = "mt-3">Click a Location to Reveal Map</p>
        <div id = "mapWrapper" class = "rounded shadow">
        </div>
    </div>
    <div class = "modal fade" id = "loadingModal" tabindex= "-1">
        <div class = "modal-dialog  modal-dialog-centered">
            <div class = "modal-content">
                <div class = "modal-header" id = "loadingModalHeader">
                    <h3 class = "modal-title" id = "loadingModalTitle">Fetching Location...</h3>
                </div>
                <div class = "modal-body" id = "loadingModalBody">
                </div>
                <div class = "modal-footer">
                </div>
            </div>
        </div>
    </div>
    <nav class="navbar fixed-bottom bg-secondary-subtle">
        <div class = "d-flex align-items-center w-100 px-5 py-2">
            <button class = "btn btn-solid-blue w-100" onclick = "checkin()">
                <i class = "bi bi-plus-circle-fill px-1"></i>
                New Check In
            </button>
        </div>
    </nav>
    <script src = "script/dashboard.js"></script>
</body>
</html>

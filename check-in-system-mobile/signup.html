<!DOCTYPE html>
<html>
<head>
    <title>Check-In System</title>
    <meta charset="utf-8">
    <meta name = "viewport" content="width= device-width, initial-scale = 1.0">
    <link href = "css/bootstrap.min.css" rel="stylesheet">
    <link href = "css/theme.css" rel="stylesheet">
    <link href = "icons/bootstrap-icons.min.css" rel = "stylesheet">
    <script src = "js/bootstrap.bundle.min.js"></script>
</head>
<body class = "mt-3 pt-3 themeBlue">   
    <div class="bg-secondary-subtle rounded p-3 mx-3 border shadow mt-5 pt-5">
        <div class = "text-center">
			<h1>Sign Up</h1>
		</div>
        <form id = "signupForm" onsubmit = "signup(event)">
            <div class="m-3 mb-4">
                <div class = "my-2 pt-3">
                    <label for = "signUpUsername" class  = "form-label text-black">Username</label>
                    <input type = "text" class = "form-control rounded p-2" id = "signUpUsername" name = "signUpUsername" required>
                </div>
                <div class = "my-2 pt-3">
                    <label for = "signUpPassword" class  = "form-label text-black">Password</label>
                    <input type = "password" class = "form-control rounded p-2" id = "signUpPassword" name = "signUpPassword" required>
                </div>
                <div class = "my-2 pt-3">
                    <label for = "signUpPassConfirm" class  = "form-label text-black">Confirm Password</label>
                    <input type = "password" class = "form-control rounded p-2" id = "signUpPassConfirm"  name = "signUpPassConfirm" required>
                </div>
                <div class = "mt-4">
                    <button type = "submit" class = "btn btn-solid-blue w-100 p-3">Sign Up</button>
                </div>
                <div class = "mt-3">
                    <a href = "index.html" class = "text-decoration-none">Log In</a>
                </div>
            </div>
        </form>
    </div>
    <div class = "modal fade" id = "signUpModal" tabindex= "-1">
        <div class = "modal-dialog  modal-dialog-centered">
            <div class = "modal-content">
                <div class = "modal-header" id = "signUpModalHeader">
                    <h3 class = "modal-title" id = "signUpModalTitle">Processing</h3>
                </div>
                <div class = "modal-body bg-light" id = "signUpModalBody">
                    <p>Redirecting...</p>
                </div>
                <div class = "modal-footer bg-light" id = "signUpModalFooter">
                </div>
            </div>
        </div>
    </div>
    <script src = "script/signup.js"></script>
</body>
</html>
